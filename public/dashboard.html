<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MMW OnboardEngine</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,900&family=Newsreader:opsz@6..72&display=swap');
  :root {
    --ink:#11140f; --paper:#f4f1e8; --paper-2:#ece7d8; --paper-3:#e3ddcb;
    --line:#11140f; --line-soft:rgba(17,20,15,.16);
    --accent:#c2410c; --accent-2:#1d4d3e; --muted:#5c5847;
    --green:#1d6b4e; --blue:#2b5f86; --amber:#b45309; --red:#b91c1c; --grey:#8a8674;
    --mono:'Space Mono',ui-monospace,Menlo,monospace;
    --serif:'Newsreader',Georgia,serif;
    --display:'Fraunces',Georgia,serif;
  }
  * { box-sizing:border-box; }
  body { margin:0; color:var(--ink); background:var(--paper);
    background-image:radial-gradient(circle at 12% 6%, rgba(194,65,12,.06), transparent 42%),
                     radial-gradient(circle at 88% 70%, rgba(29,77,62,.06), transparent 42%);
    font-family:var(--serif); font-size:15px; line-height:1.5; }

  /* Masthead */
  header { display:flex; align-items:center; gap:18px; padding:14px 26px;
    border-bottom:3px solid var(--line); background:var(--paper-2); position:sticky; top:0; z-index:5; flex-wrap:wrap; }
  .brand .kicker { font-family:var(--mono); font-size:10px; letter-spacing:.3em; text-transform:uppercase; color:var(--accent); font-weight:700; }
  .brand h1 { font-family:var(--display); font-weight:900; font-size:24px; line-height:.9; margin:2px 0 0; letter-spacing:-.01em; }
  .mode-banner { font-family:var(--mono); font-weight:700; font-size:12px; letter-spacing:.14em; padding:6px 14px; border:2px solid var(--line); }
  .mode-dry { background:var(--accent-2); color:#eef6f1; }
  .mode-live { background:var(--red); color:#fff; }
  #counts { margin-left:auto; font-family:var(--mono); font-size:11px; color:var(--muted); letter-spacing:.04em; text-align:right; }
  #pinnedSummary { font-family:var(--mono); font-size:11px; color:var(--accent); letter-spacing:.04em; }

  button { font-family:var(--mono); font-size:12px; cursor:pointer; border:2px solid var(--line);
    background:var(--paper); color:var(--ink); padding:6px 13px; transition:all .12s; }
  button:hover { background:var(--ink); color:var(--paper); }
  button.primary { background:var(--accent); border-color:var(--accent); color:#fff; }
  button.primary:hover { background:#a8380a; }
  button.tiny { padding:2px 9px; font-size:10px; letter-spacing:.05em; }

  .wrap { display:grid; grid-template-columns:340px 1fr; min-height:calc(100vh - 60px); }
  .col { padding:22px 26px; }
  .left { border-right:3px solid var(--line); background:var(--paper-2); }

  h2 { font-family:var(--mono); font-size:11px; letter-spacing:.2em; text-transform:uppercase; color:var(--accent-2);
    font-weight:700; margin:0 0 14px; padding-bottom:6px; border-bottom:1px solid var(--line-soft); }
  label { display:block; font-family:var(--mono); font-size:10px; color:var(--muted); margin:14px 0 5px; letter-spacing:.08em; text-transform:uppercase; }
  input, select, textarea { width:100%; font-family:var(--mono); font-size:13px; background:var(--paper);
    color:var(--ink); border:2px solid var(--line); border-radius:0; padding:8px 10px; }
  input:focus, select:focus, textarea:focus { outline:none; border-color:var(--accent); }

  .run-card { border:2px solid var(--line); padding:11px 13px; margin:9px 0; cursor:pointer; background:var(--paper);
    transition:all .12s; }
  .run-card:hover { background:var(--paper-3); }
  .run-card.sel { border-color:var(--accent); box-shadow:4px 4px 0 rgba(194,65,12,.18); }
  .run-card b { font-family:var(--display); font-weight:600; font-size:16px; }
  .run-card .meta { font-family:var(--mono); font-size:10px; color:var(--muted); margin-top:4px; letter-spacing:.03em; }

  .detail-head { font-family:var(--display); font-weight:900; font-size:26px; margin:0; line-height:1; }
  .chips { display:flex; flex-wrap:wrap; gap:7px; margin:16px 0 24px; }
  .chip { display:inline-flex; align-items:center; gap:7px; font-family:var(--mono); font-size:11px; padding:6px 11px;
    border:1.5px solid var(--line); background:var(--paper); }
  .chip .dot { width:9px; height:9px; border-radius:50%; flex:none; }
  .s-succeeded { background:rgba(29,107,78,.12); } .s-succeeded .dot { background:var(--green); }
  .s-simulated { background:rgba(43,95,134,.12); } .s-simulated .dot { background:var(--blue); }
  .s-running   { background:rgba(180,83,9,.14); }  .s-running .dot { background:var(--amber); animation:pulse 1.2s infinite; }
  .s-blocked   { background:rgba(180,83,9,.08); }  .s-blocked .dot { background:var(--amber); }
  .s-flagged   { background:rgba(185,28,28,.14); } .s-flagged .dot { background:var(--red); }
  .s-failed    { background:rgba(185,28,28,.14); } .s-failed .dot { background:var(--red); }
  .s-skipped   { background:rgba(138,134,116,.14); } .s-skipped .dot { background:var(--grey); }
  .s-pending   { background:rgba(138,134,116,.07); } .s-pending .dot { background:var(--grey); }
  @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:.3;} }

  .tbl-scroll { overflow-x:auto; border:2px solid var(--line); }
  table { width:100%; border-collapse:collapse; font-family:var(--mono); font-size:11px; min-width:640px; }
  th { text-align:left; background:var(--ink); color:var(--paper); font-weight:700; padding:8px 10px;
    text-transform:uppercase; letter-spacing:.08em; font-size:9px; }
  td { padding:7px 10px; border-bottom:1px solid var(--line-soft); vertical-align:top; }
  tr:nth-child(even) td { background:rgba(17,20,15,.025); }
  td.lvl-error { color:var(--red); font-weight:700; } td.lvl-warn { color:var(--amber); }
  .legend { display:flex; flex-wrap:wrap; gap:12px; font-family:var(--mono); font-size:10px; color:var(--muted); margin:6px 0 0; text-transform:uppercase; letter-spacing:.05em; }
  .legend span { display:inline-flex; align-items:center; gap:5px; }
  .legend .dot { width:8px; height:8px; border-radius:50%; }
  .empty { color:var(--muted); font-style:italic; padding:22px 0; }
  .row-actions { display:flex; gap:10px; align-items:center; margin:0 0 6px; flex-wrap:wrap; }
  pre { white-space:pre-wrap; word-break:break-word; margin:0; font-family:var(--mono); font-size:10.5px; color:var(--muted); }
  .toast { position:fixed; bottom:20px; right:20px; background:var(--ink); color:var(--paper); border:2px solid var(--accent);
    padding:11px 18px; font-family:var(--mono); font-size:12px; display:none; box-shadow:5px 5px 0 rgba(17,20,15,.2); }
  @media(max-width:780px){ .wrap{grid-template-columns:1fr;} .left{border-right:none;border-bottom:3px solid var(--line);} }
</style>
</head>
<body>
<header>
  <div class="brand">
    <div class="kicker">Medical Marketing Whiz</div>
    <h1>OnboardEngine</h1>
  </div>
  <span id="banner" class="mode-banner mode-dry">MODE: DRY</span>
  <button id="toggleMode">Toggle dry / live</button>
  <button id="editPinned" title="Steps that always run dry, even in live mode">Pinned dry</button>
  <span id="pinnedSummary"></span>
  <span id="counts"></span>
</header>

<div class="wrap">
  <!-- LEFT: trigger + run list -->
  <div class="col left">
    <h2>Manual trigger</h2>
    <label>Recipe</label>
    <select id="recipe"></select>
    <label>Client name</label>
    <input id="clientName" placeholder="Test Co" />
    <label>Website URL (sets domain for DNS / Namecheap / Warmup)</label>
    <input id="website" placeholder="https://example.com" />
    <label>Mode for this run</label>
    <select id="runMode">
      <option value="">(use global)</option>
      <option value="dry">dry</option>
      <option value="live">live</option>
    </select>
    <label>Intake JSON (advanced — overrides name / website)</label>
    <textarea id="intakeJson" rows="3" placeholder='{"Name Of Office":"...","Website URL":"..."}'></textarea>
    <label>echo demo: fail echo.root N times (try 3+ to see flagged)</label>
    <input id="failTimes" type="number" min="0" placeholder="0" />
    <div style="margin-top:16px;">
      <button class="primary" id="fire" style="width:100%;padding:10px;">Fire run</button>
    </div>

    <div style="display:flex;align-items:center;justify-content:space-between;margin-top:30px;">
      <h2 style="margin:0;border:none;padding:0;">Runs</h2>
      <button class="tiny" id="clearAllRuns" title="Delete every run (cascades steps + events + jobs)">Clear all</button>
    </div>
    <div id="runs"><div class="empty">loading…</div></div>
  </div>

  <!-- RIGHT: detail -->
  <div class="col">
    <div id="detail"><div class="empty">Select a run, or fire one.</div></div>
  </div>
</div>

<div id="toast" class="toast"></div>

<script>
const $ = (id) => document.getElementById(id);
let selectedRun = null;
let recipes = {};

function toast(msg) {
  const t = $('toast'); t.textContent = msg; t.style.display = 'block';
  setTimeout(() => { t.style.display = 'none'; }, 2600);
}

async function api(path, opts) {
  const res = await fetch(path, opts);
  const text = await res.text();
  let body; try { body = JSON.parse(text); } catch { body = text; }
  if (!res.ok) throw new Error((body && body.error) || res.status + ' ' + res.statusText);
  return body;
}

async function loadStatus() {
  try {
    const s = await api('/status');
    const live = s.mode === 'live';
    const b = $('banner');
    b.textContent = 'MODE: ' + s.mode.toUpperCase();
    b.className = 'mode-banner ' + (live ? 'mode-live' : 'mode-dry');
    const fmt = (o) => Object.entries(o).map(([k, v]) => k + ':' + v).join('  ') || '—';
    $('counts').textContent = 'steps  ' + fmt(s.steps) + '     jobs  ' + fmt(s.jobs);
    const pinned = s.pinned_dry || [];
    $('pinnedSummary').textContent = pinned.length
      ? pinned.length + ' step' + (pinned.length === 1 ? '' : 's') + ' pinned dry'
      : '';
    window.__pinnedDry = pinned;
  } catch (e) { $('counts').textContent = 'status error: ' + e.message; }
}

$('editPinned').onclick = async () => {
  const current = (window.__pinnedDry || []).join(',');
  const next = prompt(
    'Comma-separated step keys to ALWAYS run dry (even in live mode).\n' +
    'Common: namecheap.purchase_domain,dns.ghl_records,dns.mailgun_records,mailgun.add_domain,warmup.enroll\n' +
    'Empty = nothing pinned.',
    current,
  );
  if (next === null) return;
  const keys = next.split(',').map((s) => s.trim()).filter(Boolean);
  try {
    await api('/pinned-dry', { method: 'POST', headers: { 'content-type': 'application/json' }, body: JSON.stringify({ keys }) });
    toast(keys.length ? keys.length + ' steps pinned dry' : 'no steps pinned dry');
    loadStatus();
  } catch (e) { toast('error: ' + e.message); }
};

async function loadRecipes() {
  recipes = await api('/recipes');
  const sel = $('recipe');
  sel.innerHTML = '';
  Object.keys(recipes).forEach((name) => {
    const o = document.createElement('option');
    o.value = name; o.textContent = name + '  (' + recipes[name].length + ' steps)';
    sel.appendChild(o);
  });
}

async function loadRuns() {
  try {
    const runs = await api('/runs');
    const el = $('runs');
    if (!runs.length) { el.innerHTML = '<div class="empty">no runs yet</div>'; return; }
    el.innerHTML = '';
    runs.forEach((r) => {
      const d = document.createElement('div');
      d.className = 'run-card' + (r.id === selectedRun ? ' sel' : '');
      d.innerHTML =
        '<div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px;">' +
          '<div style="flex:1;min-width:0;">' +
            '<div><b>' + (r.client_name || '(no name)') + '</b></div>' +
            '<div class="meta">' + r.recipe + ' · ' + r.mode + ' · ' +
            new Date(r.created_at).toLocaleTimeString() + '</div>' +
          '</div>' +
          '<button class="tiny" data-del="' + r.id + '" title="Delete this run" style="flex:none;">✕</button>' +
        '</div>';
      d.onclick = (ev) => {
        if (ev.target && ev.target.dataset && ev.target.dataset.del) {
          ev.stopPropagation();
          deleteRun(ev.target.dataset.del, r.client_name);
          return;
        }
        selectedRun = r.id; loadDetail(); loadRuns();
      };
      el.appendChild(d);
    });
  } catch (e) { $('runs').innerHTML = '<div class="empty">runs error: ' + e.message + '</div>'; }
}

function chip(step) {
  return '<span class="chip s-' + step.status + '" title="' + (step.last_error || step.safety_class) + '">' +
    '<span class="dot"></span>' + step.step_key +
    '<button class="tiny" onclick="retryStep(event,\'' + step.step_key + '\')">retry</button></span>';
}

async function loadDetail() {
  if (!selectedRun) return;
  try {
    const { run, steps, events } = await api('/runs/' + selectedRun);
    const legend = ['succeeded','simulated','running','blocked','flagged','skipped','pending']
      .map((s) => '<span><span class="dot" style="background:var(--' +
        ({succeeded:'green',simulated:'blue',running:'amber',blocked:'amber',flagged:'red',skipped:'grey',pending:'grey'})[s] +
        ')"></span>' + s + '</span>').join('');
    let html = '<div class="row-actions">' +
      '<h2 class="detail-head" style="border:none;color:var(--ink);margin:0;">' + (run.client_name || '(no name)') + '</h2>' +
      '<button class="tiny" onclick="retryFlagged()">retry all flagged</button>' +
      '<button class="tiny" onclick="resumeRun()" title="Retry only the flagged + blocked steps (leaves completed ones alone — won\'t duplicate created assets)">resume</button>' +
      '<button class="tiny" onclick="authorizePurchase()" title="Consent to a REAL domain purchase for this run (needed alongside NAMECHEAP_LIVE for the costly step to run)">authorize purchase</button>' +
      '<button class="tiny" onclick="rerunLive(\'' + run.mode + '\')" title="Reset EVERY step and re-run the whole run live. Use only to promote a dry run — re-running a live run re-creates Drive/ClickUp assets.">re-run live</button>' +
      '<button class="tiny" onclick="loadDetail()">refresh</button></div>' +
      '<div style="font-family:var(--mono);font-size:11px;color:var(--muted);margin-bottom:14px;letter-spacing:.05em;">' +
      run.recipe + ' · ' + run.mode + '</div>' +
      '<div class="legend">' + legend + '</div>' +
      '<div class="chips">' + steps.map(chip).join('') + '</div>' +
      '<h2>Event / error feed</h2>' +
      '<div class="tbl-scroll"><table><tr><th>time</th><th>lvl</th><th>step</th><th>att</th><th>endpoint</th><th>status</th><th>detail</th></tr>' +
      events.map((e) =>
        '<tr><td>' + new Date(e.ts).toLocaleTimeString() + '</td>' +
        '<td class="lvl-' + e.level + '">' + e.level + '</td>' +
        '<td>' + e.step_key + '</td><td>' + e.attempt + '</td>' +
        '<td>' + (e.endpoint || '') + '</td>' +
        '<td>' + (e.response_status || '') + '</td>' +
        '<td><pre>' + (e.parsed_error || JSON.stringify(e.response_body || e.request_redacted || '')) + '</pre></td></tr>'
      ).join('') + '</table></div>';
    $('detail').innerHTML = html;
  } catch (e) { $('detail').innerHTML = '<div class="empty">detail error: ' + e.message + '</div>'; }
}

async function retryStep(ev, key) {
  ev.stopPropagation();
  try { await api('/runs/' + selectedRun + '/steps/' + key + '/retry', { method: 'POST' });
    toast('retrying ' + key); setTimeout(loadDetail, 600); }
  catch (e) { toast('error: ' + e.message); }
}
async function retryFlagged() {
  try { const r = await api('/runs/' + selectedRun + '/retry-flagged', { method: 'POST' });
    toast('retrying ' + (r.retried || []).length + ' flagged'); setTimeout(loadDetail, 600); }
  catch (e) { toast('error: ' + e.message); }
}

async function authorizePurchase() {
  if (!confirm('Authorize a REAL domain purchase for this run?\n\nThis is the per-run consent. The costly namecheap.purchase_domain step will buy the domain on the next run/resume IF NAMECHEAP_LIVE=true and the step is not pinned dry.')) return;
  try {
    await api('/runs/' + selectedRun + '/authorize-purchase', { method: 'POST' });
    toast('purchase authorized for this run');
  } catch (e) { toast('error: ' + e.message); }
}

async function resumeRun() {
  try {
    const r = await api('/runs/' + selectedRun + '/resume', { method: 'POST' });
    toast('resuming ' + ((r.resumed || []).length) + ' steps');
    setTimeout(loadDetail, 800);
  } catch (e) { toast('error: ' + e.message); }
}

async function rerunLive(currentMode) {
  if (!confirm('Re-run this ENTIRE run in LIVE mode?\n\nEvery step resets to pending and runs for real. Write steps reuse existing assets (find-or-create), and pinned-dry steps still simulate. This run\'s mode becomes live; the global toggle is unchanged.')) return;
  try {
    const r = await api('/runs/' + selectedRun + '/rerun', { method: 'POST', headers: { 'content-type': 'application/json' }, body: JSON.stringify({ mode: 'live' }) });
    toast('re-running live: ' + (r.reset || 0) + ' steps reset, ' + ((r.queued || []).length) + ' queued');
    setTimeout(loadDetail, 800);
  } catch (e) { toast('error: ' + e.message); }
}

async function deleteRun(id, label) {
  if (!confirm('Delete this run' + (label ? ' (' + label + ')' : '') + '? This removes its steps, events, and jobs.')) return;
  try {
    await api('/runs/' + id, { method: 'DELETE' });
    if (selectedRun === id) { selectedRun = null; $('detail').innerHTML = '<div class="empty">Select a run, or fire one.</div>'; }
    toast('deleted');
    loadRuns(); loadStatus();
  } catch (e) { toast('error: ' + e.message); }
}

$('clearAllRuns').onclick = async () => {
  if (!confirm('Delete EVERY run? This cannot be undone.')) return;
  if (!confirm('Really clear all runs?')) return;
  try {
    const r = await api('/runs/delete-all?confirm=YES', { method: 'POST' });
    selectedRun = null;
    $('detail').innerHTML = '<div class="empty">Select a run, or fire one.</div>';
    toast('deleted ' + r.deleted + ' run' + (r.deleted === 1 ? '' : 's'));
    loadRuns(); loadStatus();
  } catch (e) { toast('error: ' + e.message); }
};

$('toggleMode').onclick = async () => {
  const cur = $('banner').textContent.includes('LIVE') ? 'live' : 'dry';
  const next = cur === 'live' ? 'dry' : 'live';
  if (next === 'live' && !confirm('Switch to LIVE? Reversible-write steps will make real changes.')) return;
  await api('/mode', { method: 'POST', headers: { 'content-type': 'application/json' }, body: JSON.stringify({ mode: next }) });
  loadStatus();
};

$('fire').onclick = async () => {
  const body = { recipe: $('recipe').value };
  if ($('clientName').value) body.client = { name: $('clientName').value };
  if ($('runMode').value) body.mode = $('runMode').value;

  const raw = $('intakeJson').value.trim();
  if (raw) {
    try { body.input = JSON.parse(raw); }
    catch { toast('Intake JSON is not valid JSON'); return; }
  } else {
    const input = {};
    if ($('clientName').value) input['Name Of Office'] = $('clientName').value;
    if ($('website').value) input['Website URL'] = $('website').value;
    if (Object.keys(input).length) body.input = input;
  }
  const ft = parseInt($('failTimes').value, 10);
  if (ft > 0) body.input = { echo: { root: { failTimes: ft } } };
  try {
    const r = await api('/runs', { method: 'POST', headers: { 'content-type': 'application/json' }, body: JSON.stringify(body) });
    selectedRun = r.runId; toast('run created'); loadRuns(); loadDetail();
  } catch (e) { toast('error: ' + e.message); }
};

// boot + auto-refresh
loadRecipes(); loadStatus(); loadRuns();
setInterval(() => { loadStatus(); loadRuns(); if (selectedRun) loadDetail(); }, 3000);
</script>
</body>
</html>
